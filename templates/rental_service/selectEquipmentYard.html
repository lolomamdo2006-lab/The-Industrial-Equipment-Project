{% extends 'base.html' %}

{% block content %}

<style>
    .content {
        width: 80%;
        margin: 50px auto;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-family: Arial, sans-serif;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
    }
    th { background-color: #f4b41a; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    h1 { text-align: center; color: #333; }
</style>

<div class="content">
    <h1>🚜 Equipment and Yard Details</h1>
    <table>
        <thead>
            <tr>
                <th>Equipment ID</th>
                <th>Model</th>
                <th>Status</th>
                <th>Yard Location</th>
                <th>Yard Capacity</th>
            </tr>
        </thead>
        <tbody>
            {% for item in data %}
            <tr>
                <td>{{ item.0 }}</td>
                <td>{{ item.1 }}</td>
                <td>{{ item.2 }}</td>
                <td>{{ item.3 }}</td>
                <td>{{ item.4 }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align:center;">No data found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock content %}
