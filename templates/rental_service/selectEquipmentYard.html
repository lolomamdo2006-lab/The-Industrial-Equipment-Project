{% extends 'base.html' %}

{% block content %}

<style>

.content{

    width: 95%;

    margin: auto;

    padding: 35px;

    border-radius: 28px;

    background: rgba(22, 34, 52, 0.78);

    backdrop-filter: blur(16px);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.3);

}

/* title */

h1{

    text-align: center;

    margin-bottom: 30px;

    color: #58e1d9;

    font-size: 40px;

    letter-spacing: 1px;
}

/* table */

table{

    width: 100%;

    border-collapse: collapse;

    overflow: hidden;

    border-radius: 20px;

    margin-top: 25px;

    background: rgba(255,255,255,0.03);
}

/* header */

th{

    background: linear-gradient(
    135deg,
    #6512ff,
    #16c7c4
    );

    color: white;

    padding: 18px;

    font-size: 16px;

    text-transform: uppercase;

    letter-spacing: 1px;

    position: relative;

    overflow: hidden;
}

/* dreamy glow effect */

th::before{

    content: "";

    position: absolute;

    top: 0;

    left: -100%;

    width: 100%;

    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
    );

    transition: 0.7s;
}

/* light animation */

tr:hover th::before{

    left: 100%;
}
/* rows */

td{

    padding: 18px;

    border-bottom: 1px solid rgba(255,255,255,0.06);

    color: #dbe7f3;
}

/* hover row */

tr{

    transition: 0.3s;
}

tr:hover{

    background: rgba(88,225,217,0.08);

    transform: scale(1.003);
}

/* buttons */

.btn{

    padding: 10px 18px;

    border-radius: 12px;

    text-decoration: none;

    color: white;

    border: none;

    cursor: pointer;

    font-size: 14px;

    font-weight: 600;

    transition: 0.3s ease;

    margin-right: 8px;
}

/* insert */

.insert{

    background: linear-gradient(
    135deg,
    #45e0d5,
    #2ea7ff
    );

    display: inline-block;

    margin-bottom: 20px;

    box-shadow:
    0 6px 18px rgba(69,224,213,0.25);
}

/* edit */

.edit{

    background: linear-gradient(
    135deg,
    #4ff8fe,
    #00c6fb
    );
}

/* delete */

.delete{

    background: linear-gradient(
    135deg,
    #f03333,
    #ee5253
    );
}

/* button hover */

.btn:hover{

    transform: translateY(-3px);

    box-shadow:
    0 10px 20px rgba(0,0,0,0.25);
}

/* empty row */

td[colspan]{

    text-align: center;

    padding: 30px;

    color: #b8c7d9;
}
h1 i{

    margin-right: 12px;

    color: #ffffff;

    font-size: 34px;

    vertical-align: middle;

    text-shadow:
    0 0 15px rgba(124,239,232,0.35);
}

</style>
<div class="content">
    <h1>

<i class="fa-solid fa-screwdriver-wrench"></i>

Equipment and Yard Details

</h1>
    <table>
        <thead>
            <tr>
                <th>Equipment ID</th>
                <th>Model</th>
                <th>Status</th>
                <th>Yard Location</th>
                <th>Yard Capacity</th>
            </tr>
        </thead>
        <tbody>
            {% for item in data %}
            <tr>
                <td>{{ item.0 }}</td>
                <td>{{ item.1 }}</td>
                <td>{{ item.2 }}</td>
                <td>{{ item.3 }}</td>
                <td>{{ item.4 }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align:center;">No data found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock content %}
