{% extends 'base.html' %}

{% block content %}
<form method="POST" >
    {% csrf_token %}
        {%if messageyard%}
     <div style="color: {{color}};">{{messageyard}}</div>
    {%endif%}
     <label>Yard ID:</label>
    <input type="number" name="Yard_ID" required value={{yard.0}}><br><br>

    <label>Location:</label>
    <input type="text" name="Location" required value={{yard.1}}><br><br>

    <label>Capacity:</label>
    <input type="number" step="0.01" name="Capacity" value={{yard.2}}><br><br>

   
    <button type="submit">Save Yard</button>
</form>
<style>
    form{
        width: 80%;
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;    
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
</style>
{%endblock content%}
