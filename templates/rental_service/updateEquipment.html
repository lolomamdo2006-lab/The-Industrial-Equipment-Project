{% extends 'base.html' %}

{% block content %}
<form method="POST" >
    {% csrf_token %}
        {%if message%}
     <div style="color: {{color}};">{{message}}</div>
    {%endif%}
     <label>Equipment ID:</label>
    <input type="number" name="Equipment_ID" required value={{equipment.0}}><br><br>

    <label>Model:</label>
    <input type="text" name="Model" required value={{equipment.1}}><br><br>

    <label>Engine Power:</label>
    <input type="text" name="Engine_power" value={{equipment.2}}><br><br>

    <label>Hourly Rental Rate:</label>
    <input type="number" step="0.01" name="Hourly_rental_rate" value={{equipment.3}}><br><br>

    <label>Status:</label>
    <input type="text" name="Status" value={{equipment.4}}><br><br>

    <label>Yard ID (Foreign Key):</label>
    <input type="number" name="Yard_ID" value={{equipment.5}}> <br><br>
    <button type="submit">Save Equipment</button>
</form>
<style>
    form{
        width: 80%;
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;    
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
</style>
{%endblock content%}
