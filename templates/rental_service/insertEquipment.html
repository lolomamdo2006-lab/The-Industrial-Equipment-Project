{% extends 'base.html' %}

{% block content %}
<form method="POST" >
    {% csrf_token %} <label>Equipment ID:</label>
    <input type="number" name="Equipment_ID" required><br><br>
    {%if message%}
     <div style="color: red;">{{message}}</div>
    {%endif%}
    <label>Model:</label>
    <input type="text" name="Model" required><br><br>

    <label>Engine Power:</label>
    <input type="text" name="Engine_power"><br><br>

    <label>Hourly Rental Rate:</label>
    <input type="number" step="0.01" name="Hourly_rental_rate"><br><br>

    <label>Status:</label>
    <input type="text" name="Status"><br><br>

    <label>Yard ID (Foreign Key):</label>
    <input type="number" name="Yard_ID"> <br><br>
    <button type="submit">Save Equipment</button>
</form>
<style>
    form{
        width: 80%;
        margin-left: auto;
        margin-right: auto;
        margin-top: 50px;    
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
</style>
{%endblock content%}
